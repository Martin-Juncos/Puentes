name: Reporte de bug
description: Informar un problema reproducible del sitio publico, panel o backend.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumen
      description: Explica el problema en una o dos frases.
      placeholder: Al guardar una sesion, la pantalla queda cargando indefinidamente.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area afectada
      options:
        - Sitio publico
        - Panel interno
        - Backend / API
        - Seed / Prisma
        - Documentacion / repo
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Enumera el flujo mas corto para reproducirlo.
      placeholder: |
        1. Ingresar al panel
        2. Abrir Agenda
        3. Editar una sesion existente
        4. Presionar Guardar
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
      placeholder: La sesion deberia guardarse y mostrar feedback de exito.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
      placeholder: La pantalla queda bloqueada y no aparece mensaje.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Entorno
      description: Navegador, SO o contexto relevante.
      placeholder: Windows 11 + Chrome 136 / branch master / seed demo
