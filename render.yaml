services:
  - type: web
    runtime: node
    name: puentes-api
    region: oregon
    buildCommand: npm ci && npm run build --workspace backend
    preDeployCommand: npx prisma migrate deploy --schema backend/prisma/schema.prisma
    startCommand: npm run start --workspace backend
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
        - package.json
        - package-lock.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: puentes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: 'true'
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: CONTACT_RECEIVER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    # domains:
    #   - api.tu-dominio.com

  - type: cron
    runtime: node
    name: puentes-certificate-expiry-notifications
    region: oregon
    buildCommand: npm ci && npm run build --workspace backend
    startCommand: npm run notifications:certificate-expiry --workspace backend
    schedule: 0 12 * * *
    buildFilter:
      paths:
        - backend/**
        - package.json
        - package-lock.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: puentes-db
          property: connectionString

  - type: web
    runtime: static
    name: puentes-web
    buildCommand: npm ci && npm run build --workspace frontend
    staticPublishPath: frontend/dist
    buildFilter:
      paths:
        - frontend/**
        - package.json
        - package-lock.json
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_PUBLIC_SITE_URL
        sync: false
      - key: VITE_WHATSAPP_URL
        sync: false
    # domains:
    #   - tu-dominio.com

databases:
  - name: puentes-db
    region: oregon
    databaseName: puentes
    user: puentes
